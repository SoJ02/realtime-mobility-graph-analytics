apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper-deployment
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.3.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            - name: ZOOKEEPER_SYNC_LIMIT
              value: "2"
          resources:
            limits:
              memory: "1000Mi"
              cpu: "1000m"
---
# Required Zookeeper Service
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-service # Name used by Kafka config
  labels:
    app: zookeeper
spec:
  selector:
    app: zookeeper # Selects the pods managed by the zookeeper-deployment
  ports:
    - protocol: TCP
      port: 2181         # Port the service listens on
      targetPort: 2181    # Port the container listens on
